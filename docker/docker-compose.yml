version: "3.9"

# ═══════════════════════════════════════════════════════════════
#  RetailAI Agent — Production Docker Compose
# ═══════════════════════════════════════════════════════════════

x-common-env: &common-env
  TZ: Asia/Kolkata
  ENVIRONMENT: production
  LOG_FORMAT: json
  LOG_LEVEL: INFO

x-restart: &restart
  restart: unless-stopped

services:

  # ── Backend API ──────────────────────────────────────────────
  backend:
    <<: *restart
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: retailai/backend:latest
    container_name: retailai-backend
    environment:
      <<: *common-env
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@retailai.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_DIALECT: ${DB_DIALECT:-sqlite}
      SQLITE_PATH: /data/db/retailai.db
      POSTGRES_DSN: ${POSTGRES_DSN:-}
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
      BACKEND_URL: http://backend:8000
    volumes:
      - retailai-data:/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - retailai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - stream-relay

  # ── Frontend Dashboard ───────────────────────────────────────
  frontend:
    <<: *restart
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    image: retailai/frontend:latest
    container_name: retailai-frontend
    environment:
      <<: *common-env
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL:  ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      NEXT_PUBLIC_HLS_BASE_URL: ${NEXT_PUBLIC_HLS_BASE_URL:-http://localhost:8888}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - retailai-net
    depends_on:
      backend:
        condition: service_healthy

  # ── CV Pipeline (one per camera) ─────────────────────────────
  cv-pipeline:
    <<: *restart
    build:
      context: ./services/cv-pipeline
      dockerfile: Dockerfile
    image: retailai/cv-pipeline:latest
    container_name: retailai-cv-pipeline
    environment:
      <<: *common-env
      BACKEND_URL: http://backend:8000
      CAMERA_RTSP_URL: ${CAMERA_RTSP_URL:-}
      CV_INFERENCE_DEVICE: ${CV_INFERENCE_DEVICE:-cpu}
      CV_CONFIDENCE: ${CV_CONFIDENCE:-0.45}
      CV_TARGET_FPS: ${CV_TARGET_FPS:-10}
    volumes:
      - retailai-data:/data
    networks:
      - retailai-net
    depends_on:
      backend:
        condition: service_healthy

  # ── Stream Relay (RTSP → HLS) ────────────────────────────────
  stream-relay:
    <<: *restart
    image: bluenviron/mediamtx:latest
    container_name: retailai-stream-relay
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
    volumes:
      - ./services/stream-relay/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - retailai-net

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    <<: *restart
    image: nginx:alpine
    container_name: retailai-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - retailai-net
    depends_on:
      - backend
      - frontend

volumes:
  retailai-data:
    driver: local

networks:
  retailai-net:
    driver: bridge
