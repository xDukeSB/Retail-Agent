###############################################
#  RetailAI Agent — Docker Compose
#  Full local-first stack
###############################################

version: "3.9"

services:

  # ── FastAPI Backend ─────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: retailai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data/db:/app/data/db
      - ./data/reports:/app/data/reports
      - ./data/models:/app/data/models
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/db/retailai.db
      - DB_DIR=./data/db
      - BACKEND_DEBUG=${BACKEND_DEBUG:-false}
      - BACKEND_SECRET_KEY=${BACKEND_SECRET_KEY:-change-me}
      - MEDIAMTX_HOST=stream-relay
      - REPORTS_OUTPUT_DIR=./data/reports
      - STORE_NAME=${STORE_NAME:-My Retail Store}
      - STORE_TIMEZONE=${STORE_TIMEZONE:-Asia/Kolkata}
      - CLOUD_SYNC_ENABLED=${CLOUD_SYNC_ENABLED:-false}
    networks:
      - retailai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Next.js Frontend ─────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: retailai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_HLS_BASE_URL=http://localhost:8888
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - retailai-net

  # ── MediaMTX Stream Relay ─────────────────────
  stream-relay:
    build:
      context: ./services/stream-relay
      dockerfile: Dockerfile
    container_name: retailai-stream-relay
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
      - "9997:9997"   # API
    networks:
      - retailai-net

  # ── CV Pipeline (one per camera — scale with docker compose --scale) ─────
  cv-pipeline:
    build:
      context: ./services/cv-pipeline
      dockerfile: Dockerfile
    container_name: retailai-cv-pipeline
    restart: unless-stopped
    volumes:
      - ./data/models:/app/data/models
    environment:
      - CAMERA_ID=${CAMERA_ID:-camera-demo}
      - CAMERA_RTSP_URL=${CAMERA_RTSP_URL:-rtsp://stream-relay:8554/demo}
      - YOLO_MODEL_PATH=/app/data/models/yolo11n.pt
      - YOLO_CONFIDENCE=${YOLO_CONFIDENCE:-0.45}
      - YOLO_DEVICE=${YOLO_DEVICE:-cpu}
      - BACKEND_URL=http://backend:8000
      - TARGET_FPS=${TARGET_FPS:-10}
    depends_on:
      - backend
      - stream-relay
    networks:
      - retailai-net
    profiles:
      - camera  # Only started when explicitly requested: docker compose --profile camera up

networks:
  retailai-net:
    driver: bridge

volumes:
  retailai-db:
  retailai-models:
  retailai-reports:
